name: Build Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия программы (например, v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить PyInstaller
        run: pip install pyinstaller

      - name: Собрать EXE файл
        run: pyinstaller --onefile --noconsole --name "password_app" password_app.py

      - name: Сохранить результат
        uses: actions/upload-artifact@v4
        with:
          name: password_app-windows
          path: dist/password_app.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить PyInstaller
        run: pip install pyinstaller

      - name: Собрать исполняемый файл
        run: pyinstaller --onefile --noconsole --name "password_app" password_app.py

      - name: Сохранить результат
        uses: actions/upload-artifact@v4
        with:
          name: password_app-linux
          path: dist/password_app

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Скачать все файлы
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Создать релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Релиз ${{ github.event.inputs.version }}
          files: |
            password_app.exe
            password_app